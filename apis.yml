aid: betterworks
name: BetterWorks
description: BetterWorks is an enterprise continuous performance management platform
  that enables organizations to align, develop, and engage their workforce through
  OKR-based goal setting, check-ins, feedback, and calibration. The platform provides
  a REST API allowing developers to programmatically access and update goals, employee
  data, feedback, recognition, and performance ratings. API access supports integration
  with business-critical applications to automate progress tracking and synchronize
  workforce data across enterprise systems. BetterWorks serves mid-market and enterprise
  organizations starting at 500 employees, with robust API and integration capabilities
  included across all plans.
